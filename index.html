<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscripción - Team Cota's Muay Thai</title>

<link rel="stylesheet" href="css/styles.css">

<!-- OCR -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

</head>

<body>

<div class="form-container">

<div class="header">
<img src="assets/img/logo.png" class="logo-header">
<h2>Ficha de Inscripción</h2>

<div class="progress-bar">
<div class="progress" id="progress"></div>
</div>
</div>

<form id="registroForm" novalidate>

<!-- ================= PASO 1 ================= -->
<div class="form-step active" id="paso1">

<h3>1. Datos Personales</h3>

<!-- INE -->
<div class="ine-scanner">
<label for="ineInput" class="btn-ine">🆔 Escanear INE</label>
<input type="file" id="ineInput" accept="image/*" capture="environment" style="display:none">
<p id="ineStatus" class="status-msg"></p>
</div>

<!-- FOTO -->
<div class="foto-upload">

<label for="fotoCara" class="btn-foto">📸 Tomar Foto</label>

<input type="file" id="fotoCara" accept="image/jpeg, image/png, image/webp" style="display:none" required>

<div id="previewContainer" style="display:none; margin-top:15px; text-align:center;">
<img id="fotoPreview" style="width:130px;height:130px;border-radius:50%;object-fit:cover;">
</div>

<p id="fotoMensaje"></p>

</div>

<!-- NOMBRE -->
<div class="row">
<div class="col">
<label>Nombres*</label>
<input type="text" id="nombres" required>
</div>

<div class="col">
<label>Apellidos*</label>
<input type="text" id="apellidos" required>
</div>
</div>

<!-- MEMBRESIA -->
<label>Membresía*</label>
<select id="tipoMembresia" required>
<option value="" disabled selected>Selecciona</option>
<option value="dia">Día</option>
<option value="semana">Semana</option>
<option value="mes">Mensual</option>
</select>

<!-- FECHA -->
<label>Fecha de nacimiento*</label>
<input type="date" id="fechaNacimiento" required>

<!-- TUTOR -->
<div id="seccionTutor" class="oculto">
<label>Nombre del tutor*</label>
<input type="text" id="nombreTutor">

<label>Teléfono tutor*</label>
<input type="tel" id="telefonoTutor">
</div>

<label>Teléfono*</label>
<input type="tel" id="telefono" required pattern="[0-9]{10}">

<label>Correo*</label>
<input type="email" id="correo" required>

<button type="button" onclick="validarYAvanzar(1,2)">Siguiente ➔</button>

</div>

<!-- ================= PASO 2 ================= -->
<div class="form-step" id="paso2">

<h3>2. Dirección</h3>

<label>CP*</label>
<input type="text" id="cp" required maxlength="5" pattern="[0-9]{5}">

<label>Ciudad</label>
<input type="text" id="ciudad" readonly>

<label>Colonia*</label>
<select id="colonia" required>
<option value="">Ingrese CP</option>
</select>

<label>Calle*</label>
<input type="text" id="calle" required>

<label>Número*</label>
<input type="text" id="numero" required>

<button type="button" onclick="retroceder(1)">Atrás</button>
<button type="button" onclick="validarYAvanzar(2,3)">Siguiente</button>

</div>

<!-- ================= PASO 3 ================= -->
<div class="form-step" id="paso3">

<h3>3. Médico</h3>

<label>Seguro*</label>
<select id="sistemaSalud" required>
<option value="">Seleccione</option>
<option>IMSS</option>
<option>ISSSTE</option>
<option>Privado</option>
<option>Ninguno</option>
</select>

<label>Padecimientos*</label>
<textarea id="padecimientos" required></textarea>

<label>Contacto emergencia*</label>
<input type="text" id="emergenciaNombre" required>

<label>Teléfono emergencia*</label>
<input type="tel" id="emergenciaTelefono" required>

<button type="button" onclick="retroceder(2)">Atrás</button>
<button type="button" onclick="validarYAvanzar(3,4)">Siguiente</button>

</div>

<!-- ================= PASO 4 ================= -->
<div class="form-step" id="paso4">

<h3>4. Contrato</h3>

<div id="contenedorContrato"></div>

<label>
<input type="checkbox" id="aceptoTerminos" required>
Acepto términos
</label>

<canvas id="pizarraFirma" width="300" height="150"></canvas>

<button type="button" onclick="limpiarFirma()">Borrar firma</button>

<button type="button" onclick="retroceder(3)">Atrás</button>
<button type="button" onclick="enviarFormulario()">Enviar</button>

</div>

</form>
</div>

<script src="js/app.js"></script>

</body>
</html>
